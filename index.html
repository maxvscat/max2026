<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>活動主視覺圖庫</title><style>*{box-sizing:border-box}body{margin:0;background:linear-gradient(135deg,#f7fcfc,#fff8ed);color:#102d3e;font-family:Arial,Microsoft JhengHei,sans-serif}main{max-width:1200px;margin:auto;padding:48px 28px 72px}.hero{padding:12px 0 34px;border-bottom:1px solid #dbe8e8}.eyebrow{color:#f57c00;letter-spacing:.16em;font-weight:800;font-size:.75rem;margin:0 0 8px}h1{font-size:clamp(2.3rem,6vw,4.8rem);line-height:.95;margin:0 0 12px;letter-spacing:-.06em}.hint{color:#5c7480;margin:0}.gallery{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:24px;padding-top:28px}.card{overflow:hidden;border-radius:20px;background:#fff;box-shadow:0 12px 32px #10364d13;border:1px solid #e8eeee}.photo{border:0;padding:0;background:#d9eeee;display:block;width:100%;cursor:zoom-in}.photo img{width:100%;height:430px;object-fit:cover;object-position:top;display:block}.copy{padding:17px 18px}.copy span{color:#f57c00;font-weight:800;font-size:.75rem}.copy h2{margin:5px 0 7px;font-size:1.1rem}.copy p{margin:0;color:#5d747c;font-size:.9rem;line-height:1.55}.lightbox{position:fixed;inset:0;z-index:10;background:#061921e8;display:grid;place-items:center;padding:24px}.box{max-height:calc(100vh - 48px);max-width:min(1000px,100%);position:relative;background:#fff;border-radius:14px;overflow:auto}.box img{display:block;max-width:100%;max-height:calc(100vh - 135px);margin:auto}.box div{padding:15px 18px}.close{position:absolute;top:10px;right:10px;background:#fff;border:0;border-radius:50%;width:37px;height:37px;font-size:1.7rem;cursor:pointer}@media(max-width:800px){main{padding:30px 16px 52px}.gallery{grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}.photo img{height:300px}}@media(max-width:460px){.gallery{grid-template-columns:1fr}.photo img{height:420px}}</style></head><body><main><header class="hero"><p class="eyebrow">POSTER GALLERY</p><h1>活動主視覺</h1><p class="hint" id="count"></p></header><section class="gallery" id="gallery"></section></main><script>const items=[{"title":"橘色主視覺","description":"洪健益議員服務團隊活動主視覺。","image":"images/0716-4.png"}];const e=s=>String(s).replace(/[&<>\"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','\"':'&quot;'}[c]));document.querySelector('#count').textContent=items.length+' 張活動主視覺，點選縮圖即可放大檢視。';document.querySelector('#gallery').innerHTML=items.map((x,i)=>'<article class=\"card\"><button class=\"photo\"><img src=\"'+x.image+'\" alt=\"'+e(x.title)+'\"></button><div class=\"copy\"><span>#'+String(i+1).padStart(2,'0')+'</span><h2>'+e(x.title)+'</h2><p>'+e(x.description)+'</p></div></article>').join('');document.querySelectorAll('.photo').forEach((b,i)=>b.onclick=()=>{let x=items[i],d=document.createElement('div');d.className='lightbox';d.innerHTML='<div class=\"box\"><button class=\"close\">×</button><img src=\"'+x.image+'\" alt=\"'+e(x.title)+'\"><div><h2>'+e(x.title)+'</h2><p>'+e(x.description)+'</p></div></div>';d.onclick=a=>{if(a.target===d||a.target.className==='close')d.remove()};document.body.append(d)});</script></body></html>
