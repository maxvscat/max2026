<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>活動主視覺圖庫</title><style>
*{box-sizing:border-box}body{margin:0;background:linear-gradient(135deg,#f7fcfc,#fff8ed);color:#102d3e;font-family:Arial,"Microsoft JhengHei",sans-serif}main{max-width:1200px;margin:auto;padding:48px 26px 70px}.hero{display:flex;align-items:end;justify-content:space-between;gap:24px;border-bottom:1px solid #dbe8e8;padding-bottom:32px}.eyebrow{margin:0 0 8px;color:#ee7400;letter-spacing:.16em;font-size:.76rem;font-weight:bold}h1{font-size:clamp(2.5rem,7vw,5rem);letter-spacing:-.07em;line-height:.9;margin:0 0 14px}h2{margin:5px 0 7px}.hint,p{color:#5a737c;margin:0}.btn{border:0;border-radius:999px;padding:11px 17px;background:#007b84;color:#fff;font-weight:bold;cursor:pointer}.btn.alt{border:1px solid #bdd2d5;color:#102d3e;background:#fff}.bar{display:none;margin:25px 0;padding:18px 20px;background:#e5f5f3;border:1px solid #bde3df;border-radius:18px;justify-content:space-between;gap:15px;align-items:center}.bar.show{display:flex}.bar strong{display:block}.bar span{font-size:.9rem;color:#4e7076}.actions{display:flex;gap:9px}.gallery{display:grid;grid-template-columns:repeat(3,1fr);gap:24px;padding-top:28px}.card{background:#fff;border:1px solid #e4eeee;border-radius:20px;overflow:hidden;box-shadow:0 12px 32px #10364d13}.card.drag{opacity:.45}.photo{border:0;padding:0;width:100%;background:#dbeeee;position:relative;cursor:zoom-in}.photo img{display:block;width:100%;height:430px;object-fit:cover;object-position:top}.copy{padding:17px 18px}.num{color:#ee7400;font-size:.75rem;font-weight:bold}.copy p{font-size:.9rem;line-height:1.55}.tools{display:none;align-items:center;gap:8px;padding:10px 12px;border-top:1px solid #dbe8e8;font-size:.82rem}.tools.show{display:flex}.tools button{border:0;border-radius:8px;padding:7px 9px;color:#007b84;background:#eef7f7;cursor:pointer}.tools .del{background:#fff1ed;color:#b53c2c}.handle{margin-right:auto;color:#69858b;cursor:grab}.overlay{position:fixed;inset:0;background:#061921e8;z-index:5;display:grid;place-items:center;padding:24px}.box{max-width:min(1000px,100%);max-height:calc(100vh - 48px);overflow:auto;position:relative;background:#fff;border-radius:15px}.box img{max-width:100%;max-height:calc(100vh - 140px);display:block;margin:auto}.box .text{padding:15px 18px}.close{position:absolute;right:10px;top:10px;border:0;background:#fff;width:37px;height:37px;border-radius:50%;font-size:1.7rem;cursor:pointer}.editor{width:min(560px,100%);background:#fff;border-radius:18px;padding:28px}.editor label{display:block;margin:14px 0;font-weight:bold;font-size:.9rem}.editor input,.editor textarea{width:100%;margin-top:7px;padding:10px;border:1px solid #cbdcdf;border-radius:9px;font:inherit}.editor img{width:110px;height:145px;object-fit:cover;border-radius:8px}.editor .foot{display:flex;justify-content:end;gap:9px;margin-top:20px}@media(max-width:800px){main{padding:30px 16px}.hero,.bar{align-items:flex-start;flex-direction:column}.gallery{grid-template-columns:repeat(2,1fr);gap:14px}.photo img{height:300px}}@media(max-width:460px){.gallery{grid-template-columns:1fr}.photo img{height:430px}}
</style></head><body><main><header class="hero"><div><p class="eyebrow">POSTER GALLERY</p><h1>活動主視覺</h1><p class="hint" id="count"></p></div><button class="btn" id="toggle">管理圖片</button></header><section class="bar" id="bar"><div><strong>管理模式</strong><span>可新增、修改說明、刪除，或拖曳卡片調整順序。</span></div><div class="actions"><button class="btn alt" id="reset">還原預設</button><button class="btn" id="add">＋ 新增圖片</button></div></section><section class="gallery" id="gallery"></section></main><script>
const seed=[['0716-1','橘色主視覺','洪健益議員服務團隊活動主視覺。','images/0716-1.png'],['0716-2','綠橘配色版本','競技陀螺王活動主視覺，綠橘雙色標題。','images/0716-2.png'],['0716-3','墨綠色標題版本','競技陀螺王活動主視覺，墨綠色標題。','images/0716-3.png']].map(([id,title,desc,img])=>({id,title,desc,img}));const key='poster-gallery-admin-v1';let list=JSON.parse(localStorage.getItem(key)||'null')||seed,admin=false,drag=null;const $=s=>document.querySelector(s);function save(){localStorage.setItem(key,JSON.stringify(list))}function esc(s){return s.replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}function render(){$('#count').textContent=`${list.length} 張活動主視覺，點選縮圖即可放大檢視。`;$('#gallery').innerHTML=list.map((x,i)=>`<article class="card" draggable="${admin}" data-id="${x.id}"><button class="photo" data-view="${x.id}"><img src="${x.img}" alt="${esc(x.title)}"></button><div class="copy"><span class="num">#${String(i+1).padStart(2,'0')}</span><h2>${esc(x.title)}</h2><p>${esc(x.desc)}</p></div><div class="tools ${admin?'show':''}"><span class="handle">⠿ 拖曳排序</span><button data-edit="${x.id}">編輯</button><button class="del" data-del="${x.id}">刪除</button></div></article>`).join('');document.querySelectorAll('[data-view]').forEach(b=>b.onclick=()=>view(list.find(x=>x.id===b.dataset.view)));document.querySelectorAll('[data-edit]').forEach(b=>b.onclick=()=>edit(list.find(x=>x.id===b.dataset.edit)));document.querySelectorAll('[data-del]').forEach(b=>b.onclick=()=>{if(confirm('確定要刪除這張圖片嗎？')){list=list.filter(x=>x.id!==b.dataset.del);save();render()}});if(admin)document.querySelectorAll('.card').forEach(c=>{c.ondragstart=()=>drag=c.dataset.id;c.ondragover=e=>e.preventDefault();c.ondrop=e=>{e.preventDefault();let a=list.findIndex(x=>x.id===drag),b=list.findIndex(x=>x.id===c.dataset.id);if(a!==b){let [m]=list.splice(a,1);list.splice(b,0,m);save();render()}}})}function view(x){let d=document.createElement('div');d.className='overlay';d.innerHTML=`<div class="box"><button class="close">×</button><img src="${x.img}" alt="${esc(x.title)}"><div class="text"><h2>${esc(x.title)}</h2><p>${esc(x.desc)}</p></div></div>`;d.onclick=e=>{if(e.target===d||e.target.className==='close')d.remove()};document.body.append(d)}function edit(x={id:crypto.randomUUID(),title:'',desc:'',img:''}){let d=document.createElement('div');d.className='overlay';d.innerHTML=`<div class="editor"><p class="eyebrow">ADMIN EDITOR</p><h2>${list.some(y=>y.id===x.id)?'修改圖片':'新增圖片'}</h2><label>圖片標題<input id="title" value="${esc(x.title)}"></label><label>文字說明<textarea id="desc" rows="3">${esc(x.desc)}</textarea></label><label>上傳圖片<input id="file" type="file" accept="image/*"></label>${x.img?`<img id="preview" src="${x.img}" alt="預覽">`:'<img id="preview" hidden>'}<div class="foot"><button class="btn alt" id="cancel">取消</button><button class="btn" id="ok">儲存圖片</button></div></div>`;let image=x.img;d.querySelector('#file').onchange=e=>{let f=e.target.files[0];if(f){let r=new FileReader;r.onload=()=>{image=r.result;let p=d.querySelector('#preview');p.src=image;p.hidden=false};r.readAsDataURL(f)}};d.querySelector('#cancel').onclick=()=>d.remove();d.querySelector('#ok').onclick=()=>{let item={...x,title:d.querySelector('#title').value.trim(),desc:d.querySelector('#desc').value.trim(),img:image};if(!item.title||!item.img)return alert('請輸入標題並上傳圖片。');let n=list.findIndex(y=>y.id===x.id);n<0?list.push(item):list[n]=item;save();d.remove();render()};document.body.append(d)}$('#toggle').onclick=()=>{admin=!admin;$('#toggle').textContent=admin?'完成管理':'管理圖片';$('#bar').classList.toggle('show',admin);render()};$('#add').onclick=()=>edit();$('#reset').onclick=()=>{if(confirm('要還原為預設的三張圖片嗎？')){list=seed;save();render()}};render();
</script></body></html>
