<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>活動主視覺圖庫</title><link rel="stylesheet" href="style.css"></head><body><main><header class="hero"><div><p class="eyebrow">POSTER GALLERY</p><h1>活動主視覺</h1><p class="hint" id="count">載入中…</p></div></header><section class="gallery" id="gallery"></section></main><script>
const esc=s=>String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));async function load(){let d=await fetch('api.php?action=list').then(r=>r.json());let a=d.items||[];document.querySelector('#count').textContent=`${a.length} 張活動主視覺，點選縮圖即可放大檢視。`;document.querySelector('#gallery').innerHTML=a.map((x,i)=>`<article class="card"><button class="photo" data-id="${x.id}"><img src="${x.image}" alt="${esc(x.title)}"></button><div class="copy"><span class="num">#${String(i+1).padStart(2,'0')}</span><h2>${esc(x.title)}</h2><p>${esc(x.description)}</p></div></article>`).join('');document.querySelectorAll('[data-id]').forEach(b=>b.onclick=()=>view(a.find(x=>x.id===b.dataset.id)))}function view(x){let d=document.createElement('div');d.className='overlay';d.innerHTML=`<div class="box"><button class="close">×</button><img src="${x.image}" alt="${esc(x.title)}"><div class="text"><h2>${esc(x.title)}</h2><p>${esc(x.description)}</p></div></div>`;d.onclick=e=>{if(e.target===d||e.target.className==='close')d.remove()};document.body.append(d)}load().catch(()=>document.querySelector('#count').textContent='無法讀取圖庫資料。');
</script></body></html>
